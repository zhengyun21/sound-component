<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Wave Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    h1 {
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 40px;
    }
    
    .wave-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
    }

    .bars-container {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 120px;
    }

    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 4px;
    }

    .bar {
      width: 4px;
      background-color: #fff;
      border-radius: 2px;
      transition: height 0.1s ease-out;
    }

    .timeline-container {
      display: flex;
      gap: 6px;
      height: 20px;
      align-items: center;
    }

    .time-label {
      width: 4px;
      height: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 10px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .controls {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    .volume-display {
      color: #fff;
      font-size: 16px;
    }
    
    .volume-slider {
      width: 200px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #333;
      border-radius: 3px;
      outline: none;
    }
    
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .auto-button {
      padding: 10px 24px;
      background-color: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .auto-button:hover {
      opacity: 0.8;
    }
    
    .auto-button.active {
      background-color: #4CAF50;
      color: #fff;
    }

    .time-display {
      color: #fff;
      font-size: 16px;
    }

    .button-group {
      display: flex;
      gap: 15px;
    }

    .mic-button {
      width: 48px;
      height: 48px;
      background-color: #fff;
      color: #000;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-button:hover {
      opacity: 0.8;
    }

    .mic-button.recording {
      background-color: #ff3b30;
      color: #fff;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }
  </style>
</head>
<body>
  <h1>Sound Wave Demo</h1>

  <div class="wave-container">
    <div class="bars-container" id="soundWaveContainer"></div>
    <div class="timeline-container" id="timelineContainer"></div>
  </div>

  <div class="controls">
    <div class="volume-display">Volume: <span id="volumeValue">0.00</span></div>
    <div class="time-display">Time: <span id="timeValue">00:00</span></div>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
    <div class="button-group">
      <button class="mic-button" id="micButton" aria-label="开始录音">🎤</button>
      <button class="auto-button" id="autoButton">Auto Mode</button>
    </div>
  </div>

  <script>
    const barsContainer = document.getElementById('soundWaveContainer');
    const timelineContainer = document.getElementById('timelineContainer');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const timeValue = document.getElementById('timeValue');
    const autoButton = document.getElementById('autoButton');
    const micButton = document.getElementById('micButton');
    
    const BAR_COUNT = 30;
    const MIN_HEIGHT = 12;
    const MAX_HEIGHT = 58;
    const BAR_WIDTH = 4;
    const BAR_GAP = 6;
    const TIME_LABEL_INTERVAL = 5;
    
    let autoMode = false;
    let autoInterval = null;
    let volumes = Array(BAR_COUNT).fill(0).map(() => ({ value: 0, time: null }));
    let recordingStartTime = null;
    let animationFrameId = null;
    let bars = [];
    let timeLabels = [];
    
    let isRecording = false;
    let audioContext = null;
    let analyser = null;
    let microphoneStream = null;
    let dataArray = null;
    let smoothedVolume = 0;
    const NOISE_THRESHOLD = 0.05;
    const SMOOTHING_FACTOR = 0.3;
    
    function createBars() {
      barsContainer.innerHTML = '';
      bars = [];
      for (let i = 0; i < BAR_COUNT; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'bar-wrapper';
        
        const barTop = document.createElement('div');
        barTop.className = 'bar bar-top';
        barTop.style.width = BAR_WIDTH + 'px';
        barTop.style.height = MIN_HEIGHT / 2 + 'px';
        
        const barBottom = document.createElement('div');
        barBottom.className = 'bar bar-bottom';
        barBottom.style.width = BAR_WIDTH + 'px';
        barBottom.style.height = MIN_HEIGHT / 2 + 'px';
        
        wrapper.appendChild(barTop);
        wrapper.appendChild(barBottom);
        barsContainer.appendChild(wrapper);
        
        bars.push({ top: barTop, bottom: barBottom });
      }
    }
    
    function createTimeline() {
      timelineContainer.innerHTML = '';
      for (let i = 0; i < BAR_COUNT; i++) {
        const label = document.createElement('div');
        label.className = 'time-label';
        label.style.width = BAR_WIDTH + 'px';
        label.textContent = '';
        timelineContainer.appendChild(label);
      }
      timeLabels = timelineContainer.querySelectorAll('.time-label');
    }
    
    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const tenths = Math.floor((ms % 1000) / 100);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${tenths}`;
    }

    function formatTimeForDisplay(ms) {
      return formatTime(ms).slice(0, 5);
    }

    function updateBars(newVolume, isRecording = false) {
      let timeLabel = null;
      if (isRecording && recordingStartTime) {
        const elapsed = Date.now() - recordingStartTime;
        timeLabel = formatTime(elapsed);
        timeValue.textContent = formatTimeForDisplay(elapsed);
      }
      
      volumes.shift();
      volumes.push({ value: newVolume, time: timeLabel });
      
      bars.forEach((barPair, index) => {
        const volume = volumes[index].value;
        const halfHeight = MIN_HEIGHT / 2 + volume * ((MAX_HEIGHT - MIN_HEIGHT) / 2);
        barPair.top.style.height = halfHeight + 'px';
        barPair.bottom.style.height = halfHeight + 'px';
      });
      
      timeLabels.forEach((label, index) => {
        const time = volumes[index].time;
        if (time && index % TIME_LABEL_INTERVAL === 0) {
          label.textContent = time;
        } else {
          label.textContent = '';
        }
      });
      
      volumeValue.textContent = newVolume.toFixed(2);
    }
    
    function startAutoMode() {
      if (autoMode) return;

      stopMicrophone();

      autoMode = true;
      autoButton.classList.add('active');
      autoButton.textContent = 'Stop';

      autoInterval = setInterval(() => {
        const randomVolume = Math.random();
        updateBars(randomVolume);
        volumeSlider.value = randomVolume;
      }, 100);
    }
    
    function stopAutoMode() {
      if (!autoMode) return;
      
      autoMode = false;
      autoButton.classList.remove('active');
      autoButton.textContent = 'Auto Mode';
      
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
      }
    }
    
    async function startMicrophone() {
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        microphoneStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: false
          }
        });

        const source = audioContext.createMediaStreamSource(microphoneStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        dataArray = new Float32Array(analyser.fftSize);

        isRecording = true;
        recordingStartTime = Date.now();
        micButton.classList.add('recording');
        micButton.textContent = '🔴';

        stopAutoMode();
        volumeSlider.disabled = true;
        animate();
      } catch (error) {
        console.error('麦克风权限被拒绝:', error);
        alert('无法获取麦克风权限，请允许使用麦克风后重试。\n\n将继续使用手动滑块模式。');
      }
    }
    
    function stopMicrophone() {
      if (!isRecording) return;

      isRecording = false;
      micButton.classList.remove('recording');
      micButton.textContent = '🎤';
      volumeSlider.disabled = false;

      if (microphoneStream) {
        microphoneStream.getTracks().forEach(track => track.stop());
        microphoneStream = null;
      }

      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      smoothedVolume = 0;
    }
    
    function calculateVolume() {
      if (!analyser || !dataArray) return 0;

      analyser.getFloatTimeDomainData(dataArray);

      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        const amplitude = dataArray[i];
        sum += amplitude * amplitude;
      }

      const rms = Math.sqrt(sum / dataArray.length);
      const normalizedVolume = Math.min(rms * 3, 1);

      if (normalizedVolume < NOISE_THRESHOLD) {
        return 0;
      }

      smoothedVolume = smoothedVolume * SMOOTHING_FACTOR + normalizedVolume * (1 - SMOOTHING_FACTOR);

      return smoothedVolume;
    }
    
    function animate() {
      if (!isRecording) return;

      const volume = calculateVolume();
      updateBars(volume, true);
      volumeSlider.value = volume;

      animationFrameId = requestAnimationFrame(animate);
    }
    
    volumeSlider.addEventListener('input', (e) => {
      if (autoMode) {
        stopAutoMode();
      }
      if (isRecording) {
        stopMicrophone();
      }
      const volume = parseFloat(e.target.value);
      updateBars(volume);
    });
    
    autoButton.addEventListener('click', () => {
      if (autoMode) {
        stopAutoMode();
      } else {
        startAutoMode();
      }
    });
    
    micButton.addEventListener('click', () => {
      if (isRecording) {
        stopMicrophone();
      } else {
        startMicrophone();
      }
    });
    
    createBars();
    createTimeline();
    updateBars(0.5);
  </script>
</body>
</html>
